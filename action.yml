name: "Podcast Genrator"
author: "Gaby"
description: "Generates a feed"
runs:
  using: "docker"
  image: "Dockerfile"
branching:
  icon: "git-branch"
  color: "red"
inputs:
  email:
    description: The commiter's emial address
    required: true
    default: ${{ github.actor }}@localhost
  name: 
    description: The committer's name
    required: true
    default: ${{ github.actor }}
